<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    {% assign current = page.name %}
    <header class="site-header">
      <div class="site-shell header-inner">
        <div class="brand">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.data.profile.name }}</a>
        </div>
        <nav class="site-nav" aria-label="Primary">
          <ul>
            <li><a href="{{ '/' | relative_url }}"{% if current == 'index.html' %} class="active" aria-current="page"{% endif %}>Home</a></li>
            <li><a href="{{ '/research.html' | relative_url }}"{% if current == 'research.html' %} class="active" aria-current="page"{% endif %}>Research</a></li>
            <li><a href="{{ '/experience.html' | relative_url }}"{% if current == 'experience.html' %} class="active" aria-current="page"{% endif %}>Teaching</a></li>
            <li><a href="{{ '/cv.html' | relative_url }}"{% if current == 'cv.html' %} class="active" aria-current="page"{% endif %}>CV</a></li>
            <li><a href="{{ '/media.html' | relative_url }}"{% if current == 'media.html' %} class="active" aria-current="page"{% endif %}>Media</a></li>
            <li><a href="{{ '/contact.html' | relative_url }}"{% if current == 'contact.html' %} class="active" aria-current="page"{% endif %}>Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="site-shell">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-shell">
        <p>Copyright &copy; Bernard Sarpong</p>
      </div>
    </footer>
  </body>
</html>
