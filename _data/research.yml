overview:
  - Bernard's research agenda focuses on how crisis-time exposures influence persistent behavioural tendencies, economic decision-making, and long-run outcomes.
  - He is especially interested in questions at the intersection of development economics, behavioural economics, and labour demography, using empirical strategies that speak directly to policy and institutional design.
current_questions:
  - How do crisis-time political and economic exposures shape later protest behaviour and civic engagement?
  - In what ways does exposure to macroeconomic crises alter risk preferences and other behavioural responses to uncertainty?
  - When do debt-growth relationships exhibit heterogeneous threshold effects across countries or periods?
methods:
  - Applied microeconometric analysis
  - Causal inference and quasi-experimental designs
  - Policy evaluation
  - Administrative and survey data analysis
