biography:
  - Bernard Kofi Sarpong is an economist and researcher based in Tokyo, Japan. His work studies how exogenous shocks, macroeconomic crises, and institutional exposures shape behaviour over the life course.
  - His research combines applied microeconometrics, development economics, labour demography, and behavioural economics, with a particular interest in causal inference and policy-relevant empirical evidence.
