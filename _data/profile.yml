biography:
  - I am an economist with over a decade of combined academic and banking industry experience.  My current research interests lie at the intersection of applied microeconometrics, development economics, and behavioural economics.
  - I focus on leveraging both natural experiments and quasi-experimental designs to identify the long-term causal effects of exogenous shocks across diverse contexts.
